services:
  web:
    build: .
    env_file:
      - .env
    environment:
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5000
      FLASK_DEBUG: "1"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ${MYA_EXPORT_HOST_DIR:-./mya-output}:/mya-output
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python app.py"
