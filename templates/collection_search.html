<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Collection Search</title>
  </head>
  <body>
    <h1>Collection Search</h1>
    <p>Search: <strong>{{ query }}</strong></p>

    <ol>
      {% for result in results %}
        <li>
          <strong>{{ result.get("display_name", "Unnamed collection") }}</strong>
          <br>
          <code>{{ result.get("id", "") }}</code>
          <br>
          <a href="{{ url_for('browse_collection', collection_id=result.get('id'), path='/') }}">Browse</a>
        </li>
      {% else %}
        <li>No collections found.</li>
      {% endfor %}
    </ol>

    <p><a href="{{ url_for('index') }}">Back</a></p>
  </body>
</html>
