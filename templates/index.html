<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>AmSC Globus Data Delivery</title>
  </head>
  <body>
    <h1>AmSC Globus Data Delivery</h1>

    {% if logged_in %}
      <p>Logged in with Globus.</p>
      <form action="{{ url_for('search_collections') }}" method="get">
        <label>
          Destination collection search:
          <input name="q" required>
        </label>
        <button type="submit">Search</button>
      </form>
      <p><a href="{{ url_for('logout') }}">Logout</a></p>
    {% else %}
      <p>Not logged in.</p>
      <p><a href="{{ url_for('login') }}">Login with Globus</a></p>
    {% endif %}
  </body>
</html>
